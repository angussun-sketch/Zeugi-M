services:
  postgres:
    image: postgres:16-alpine
    container_name: zeugi-m-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: zeugi
      POSTGRES_PASSWORD: zeugi_dev
      POSTGRES_DB: zeugi_m
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
